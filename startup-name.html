<!DOCTYPE html>
<html>
<head>
<title>Startup Name Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;text-align:center;padding:40px;">

<h1>Startup Name Generator</h1>

<input type="text" id="keyword" placeholder="Enter startup keyword">

<br><br>

<button onclick="generate()">Generate Startup Name</button>

<h2>Results</h2>

<div id="result"></div>

<script>

function copyName(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

function generate(){

const keyword = document.getElementById("keyword").value;

const prefix = ["Tech","Next","Neo","Future","Hyper","Quantum","Nova","Meta"];
const suffix = ["Labs","Tech","AI","Systems","Soft","Works","Flow","Logic"];

let output="";

for(let i=0;i<10;i++){

const p = prefix[Math.floor(Math.random()*prefix.length)];
const s = suffix[Math.floor(Math.random()*suffix.length)];

const name = p + keyword + s;

output += "<p>"+name+" <button onclick=\"copyName('"+name+"')\">Copy</button></p>";

}

document.getElementById("result").innerHTML = output;

}

</script>

</body>
</html>
