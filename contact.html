<!DOCTYPE html>
<html>
<head>

<title>Contact - AI Name Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
margin:0;
background:#fafafa;
}

header{
background:#1a73e8;
color:white;
padding:40px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1a73e8;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<h1>Contact Us</h1>

</header>

<div class="container">

<p>If you have questions or suggestions, feel free to contact us.</p>

<form>

<input placeholder="Your Name">

<input placeholder="Your Email">

<textarea rows="5" placeholder="Your Message"></textarea>

<button>Send Message</button>

</form>

</div>

</body>
</html>
