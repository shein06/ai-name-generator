<script>

function copyName(text){
navigator.clipboard.writeText(text);
alert("Copied: " + text);
}

function generate(){

const keyword = document.getElementById("keyword").value;

const prefix = ["Urban","Smart","Prime","Next","Bright","Nova"];
const suffix = ["Lab","Hub","Works","Forge","Studio","Group"];

let output="";

for(let i=0;i<10;i++){

const p = prefix[Math.floor(Math.random()*prefix.length)];
const s = suffix[Math.floor(Math.random()*suffix.length)];

const name = p + keyword + s;

output += "<p>"+name+" <button onclick=\"copyName('"+name+"')\">Copy</button></p>";

}

document.getElementById("result").innerHTML = output;

}

</script>
