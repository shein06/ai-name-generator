<!DOCTYPE html>
<html>
<head>
<title>Brand Name Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;text-align:center;padding:40px;">

<h1>Brand Name Generator</h1>

<input type="text" id="keyword" placeholder="Enter brand keyword">

<br><br>

<button onclick="generate()">Generate Brand</button>

<h2>Results</h2>

<div id="result"></div>

<script>

function generate(){

const keyword = document.getElementById("keyword").value;

const prefix = ["Neo","Lux","Viva","Aura","Nova","Zen","Epic","Alpha"];
const suffix = ["ify","ly","ora","ium","ex","ify","io","ster"];

let output="";

for(let i=0;i<10;i++){

const p = prefix[Math.floor(Math.random()*prefix.length)];
const s = suffix[Math.floor(Math.random()*suffix.length)];

output += "<p>"+p+keyword+s+"</p>";

}

document.getElementById("result").innerHTML = output;

}

</script>

</body>
</html>
